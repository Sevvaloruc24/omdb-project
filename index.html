<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieNexus | Sinema Rehberi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo"><i class="fa-solid fa-clapperboard"></i> MovieNexus</div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Film veya dizi keşfet...">
                <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </header>

        <main id="mainDisplay">
            <div id="welcomeScreen" class="status-msg">
                <i class="fa-solid fa-film"></i>
                <h2>Hangi filmi merak ediyorsun?</h2>
                <p>Milyonlarca yapım arasından bir arama yap.</p>
            </div>

            <div id="movieGrid" class="movie-grid"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
