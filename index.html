<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieNexus Pro | Sinema Rehberi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo"><i class="fa-solid fa-clapperboard"></i> MovieNexus</div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Film, dizi veya kişi adı...">
                <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </header>

        <main id="mainDisplay">
            <div id="welcomeScreen" class="status-msg">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <h2>Keşfetmeye Başla</h2>
                <p>Eksik veya tam isim yazman yeterli, senin için bulacağız.</p>
            </div>
            <div id="movieGrid" class="movie-grid"></div>
        </main>
    </div>

    <div id="movieModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
